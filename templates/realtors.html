<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Realtors</title>
</head>
<body>
    <h1>Realtors</h1>

    <form method="POST" action="/realtors">
        <div>
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" required>
        </div>

        <div>
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" required>
        </div>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label for="phone">Phone</label>
            <input type="text" id="phone" name="phone">
        </div>

        <div>
            <label for="brokerage">Brokerage</label>
            <input type="text" id="brokerage" name="brokerage">
        </div>

        <button type="submit">Add Realtor</button>
    </form>

    <hr>

    {% if realtors %}
        <ul>
        {% for realtor in realtors %}
            <li>
                {{ realtor["first_name"] }} {{ realtor["last_name"] }} - {{ realtor["email"] }}
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No realtors yet.</p>
    {% endif %}
</body>
</html>
